version: "3.9"

services:
  grapheqa:
    image: grapheqa_habitat_swagat:20250909-2330
    container_name: grapheqa_dev
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
    volumes:
      - /home/artemis/project/datasets:/datasets
      - /home/artemis/project/graph_eqa_swagat:/root/graph_eqa
    working_dir: /root/graph_eqa
    tty: true
    stdin_open: true
